---
# Package declarations for declarative installation
# Packages are installed via run_onchange scripts that execute when this file changes

# Common packages installed on all profiles
common:
  # Package names vary by distro - list both
  debian:
    - dnsutils  # dig
    - whois
  arch:
    - bind      # dig
    - whois

# Arch Linux packages (desktop profile only)
arch:
  packages:
    # Core Hyprland desktop
    - ghostty
    - rofi-wayland
    - waybar
    - hyprlock
    - polkit-kde-agent
    # XDG Desktop Portal (for dark mode detection in apps)
    - xdg-desktop-portal
    - xdg-desktop-portal-hyprland
    - xdg-desktop-portal-gtk
    # Login manager
    - greetd
    - greetd-tuigreet
    # Fonts
    - ttf-hack-nerd
    - terminus-font  # HiDPI console fonts for greetd
    # Media/brightness controls
    - playerctl
    - brightnessctl
    # System
    - tailscale
    - hyprshot
    - cliphist
    - flatpak
    # Development
    - coder-bin
    - zed
    # Media viewers
    - gthumb
    - vlc
    - mpv
    # Camera/photo tools
    - perl-image-exiftool
    - gphoto2
    # GStreamer for video thumbnails/preview in gthumb
    - gstreamer
    - gst-plugins-base
    - gst-plugins-good
    - gst-plugins-bad
    - gst-plugins-ugly
    - gst-libav
    # Gaming / Proton tooling
    - protonup-qt
    - lug-helper  # Star Citizen on Linux prefix/launcher manager
    # Printing (CUPS + driverless IPP Everywhere via Avahi)
    - cups
    - cups-filters
    - cups-pdf
    - nss-mdns  # .local hostname resolution for network printers
    - system-config-printer
  device_packages:
    - name: opendeck-bin
      usb_ids:
        - "0fd9:0084"  # Stream Deck Plus
  # GPU-conditional packages (installed when NVIDIA GPU is detected via lspci)
  # Driver modules are installed dynamically per-kernel in the install script
  gpu_packages:
    nvidia:
      - nvidia-utils
      - lib32-nvidia-utils
      - egl-wayland
      - docker
      - docker-compose
      - nvidia-container-toolkit
